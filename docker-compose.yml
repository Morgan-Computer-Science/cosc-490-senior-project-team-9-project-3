services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      SQLALCHEMY_DATABASE_URL: sqlite:////app/storage/morgan_ai.db
      ALLOWED_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - morgan_ai_db:/app/storage

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  morgan_ai_db:
